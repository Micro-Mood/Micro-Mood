<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" width="880" height="240" role="img" aria-label="CoCandy">
  <title>CoCandy</title>
  <defs>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#ff3d00">
        <animate attributeName="stop-color" values="#ff3d00;#ff8a00;#ff3d00" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="55%" stop-color="#ff8a00">
        <animate attributeName="stop-color" values="#ff8a00;#ffc83d;#ff8a00" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ffd84d">
        <animate attributeName="stop-color" values="#ffd84d;#ff5e00;#ffd84d" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="orangeSoft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd84d" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff3d00" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- shadow ghost -->
  <text x="445" y="155"
        text-anchor="middle"
        font-family="Georgia, 'Iowan Old Style', 'Times New Roman', serif"
        font-style="italic" font-weight="700"
        font-size="148"
        fill="url(#orangeSoft)"
        opacity="0.35">CoCandy</text>

  <!-- main wordmark -->
  <text x="440" y="150"
        text-anchor="middle"
        font-family="Georgia, 'Iowan Old Style', 'Times New Roman', serif"
        font-style="italic" font-weight="700"
        font-size="148"
        letter-spacing="-2"
        fill="url(#orange)"
        filter="url(#glow)">CoCandy</text>

  <!-- swash underline with curl tucked lower under the text -->
  <path d="M168 182 C 300 214, 580 214, 712 188 C 728 184, 732 200, 716 206 C 706 210, 700 200, 706 194"
        stroke="url(#orange)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>

  <!-- candy dots -->
  <g fill="url(#orange)">
    <circle cx="120" cy="70"  r="5"/>
    <circle cx="760" cy="60"  r="6"/>
    <circle cx="800" cy="110" r="3"/>
    <circle cx="92"  cy="130" r="3"/>
    <circle cx="140" cy="200" r="3.5"/>
    <circle cx="740" cy="200" r="4"/>
  </g>

  <!-- sparkle stars -->
  <g fill="url(#orange)">
    <path d="M70 90 l3 -10 l3 10 l10 3 l-10 3 l-3 10 l-3 -10 l-10 -3 z"/>
    <path d="M810 170 l2.5 -8 l2.5 8 l8 2.5 l-8 2.5 l-2.5 8 l-2.5 -8 l-8 -2.5 z"/>
  </g>

  <!-- tagline -->
  <text x="440" y="230"
        text-anchor="middle"
        font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Consolas, monospace"
        font-size="15"
        letter-spacing="6"
        fill="#ff8a00"
        opacity="0.85">SWEET · SMART · SHIPPED</text>
</svg>
